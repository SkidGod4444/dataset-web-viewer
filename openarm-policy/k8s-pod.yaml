apiVersion: v1
kind: Pod
metadata:
  name: openarm-train
  namespace: dgx-gu-power-restricted
  labels:
    app: openarm-train
spec:
  restartPolicy: Never

  # Stay on a DGX node that actually has H200s
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

  containers:
    - name: openarm-train
      # NVIDIA-maintained PyTorch image — CUDA 12.x, Python 3.10, uv/pip ready
      image: nvcr.io/nvidia/pytorch:24.12-py3
      imagePullPolicy: IfNotPresent

      # Keep the pod alive so you can exec in and run pipeline steps manually.
      # Replace with your actual training command once data is staged:
      #   command: ["bash", "openarm-policy/train_act.sh", "PICK_SMALL_OBJECTS"]
      command: ["/bin/bash", "-c", "trap 'exit 0' SIGTERM; while true; do sleep 60; done"]

      resources:
        requests:
          cpu: "12"
          memory: "120Gi"
          nvidia.com/gpu: "2"
        limits:
          cpu: "12"
          memory: "120Gi"
          nvidia.com/gpu: "2"

      env:
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_IB_DISABLE
          value: "0"
        - name: TORCH_NCCL_BLOCKING_WAIT
          value: "1"
        # Point lerobot / HF cache somewhere on the PVC, not /root
        - name: HF_HOME
          value: "/workspace/cache/huggingface"
        - name: TRANSFORMERS_CACHE
          value: "/workspace/cache/huggingface"

      volumeMounts:
        # Main workspace: code + data + checkpoints
        - name: workspace
          mountPath: /workspace
        # /dev/shm for PyTorch DataLoader shared memory
        - name: dshm
          mountPath: /dev/shm

      workingDir: /workspace

  volumes:
    # ---- persistent storage (edit claimName to match your PVC) ----
    # Create the PVC first:
    #   kubectl -n dgx-gu-power-restricted apply -f pvc.yaml
    - name: workspace
      persistentVolumeClaim:
        claimName: openarm-workspace

    # Shared memory: 32 Gi is enough headroom for multi-worker DataLoader
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 32Gi

---
# PVC — create once, survives pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openarm-workspace
  namespace: dgx-gu-power-restricted
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Gi
  # Remove or change storageClassName to match what your cluster offers:
  #   kubectl get storageclass
  storageClassName: ""
