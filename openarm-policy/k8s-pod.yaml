apiVersion: v1
kind: Pod
metadata:
  name: openarm-train
  namespace: dgx-gu-power-restricted
  labels:
    app: openarm-train
spec:
  restartPolicy: Never

  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule

  containers:
    - name: openarm-train
      image: nvcr.io/nvidia/pytorch:24.12-py3
      imagePullPolicy: IfNotPresent

      # Keep alive for interactive use — exec in and run pipeline steps manually.
      # Swap for the real command once data is staged:
      #   command: ["bash", "/home/dgx-gu-power/dataset-web-viewer/openarm-policy/train_act.sh", "PICK_SMALL_OBJECTS"]
      command: ["/bin/bash", "-c", "trap 'exit 0' SIGTERM; while true; do sleep 60; done"]

      resources:
        requests:
          cpu: "12"
          memory: "120Gi"
          nvidia.com/gpu: "2"
        limits:
          cpu: "12"
          memory: "120Gi"
          nvidia.com/gpu: "2"

      env:
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_IB_DISABLE
          value: "0"
        - name: TORCH_NCCL_BLOCKING_WAIT
          value: "1"
        - name: HF_HOME
          value: "/home/dgx-gu-power/cache/huggingface"
        - name: TRANSFORMERS_CACHE
          value: "/home/dgx-gu-power/cache/huggingface"

      volumeMounts:
        - name: home
          mountPath: /home/dgx-gu-power
        - name: dshm
          mountPath: /dev/shm

      workingDir: /home/dgx-gu-power

  volumes:
    # NFS home dir — same path as on the headnode, available on all DGX nodes
    - name: home
      hostPath:
        path: /home/dgx-gu-power
        type: Directory

    # Shared memory for PyTorch DataLoader multi-worker
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 32Gi
